<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tasks-manager 拡張 — 設定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    tasks-manager 拡張 — 設定
  </h1>
  <p class="subtitle">3つの値を入力して保存してください</p>

  <p class="section-title">Gemini API</p>

  <div class="field">
    <label for="geminiApiKey">GEMINI_API_KEY</label>
    <p class="field-desc">Google AI Studio で取得したAPIキー</p>
    <input type="password" id="geminiApiKey" placeholder="AIza...">
  </div>

  <p class="section-title section-gap">GAS（Google Apps Script）</p>

  <div class="field">
    <label for="gasWebAppUrl">GAS WebアプリURL</label>
    <p class="field-desc">tasks-manager の GAS をデプロイした「ウェブアプリURL」</p>
    <input type="text" id="gasWebAppUrl" placeholder="https://script.google.com/macros/s/...">
  </div>

  <div class="field">
    <label for="gasToken">GAS トークン</label>
    <p class="field-desc">GAS 側の apiToken2 と一致するトークン（必須）</p>
    <input type="password" id="gasToken" placeholder="GASトークンを入力してください">
  </div>

  <button class="btn-save" id="btn-save" type="button">保存</button>
  <p id="status"></p>

  <p class="reopen-link"><a href="#" id="btn-welcome">初期設定をやり直す</a></p>

  <script src="options.js"></script>
</body>
</html>
