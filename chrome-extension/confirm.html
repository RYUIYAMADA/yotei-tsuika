<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予定を確認・登録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="confirm.css">
</head>
<body>
  <h1>
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="12" y1="14" x2="12" y2="18"/>
      <line x1="10" y1="16" x2="14" y2="16"/>
    </svg>
    予定を確認・登録
  </h1>

  <div class="field">
    <label for="title">タイトル</label>
    <input type="text" id="title" placeholder="例: 🏀スポンサー提案MTG">
  </div>

  <div class="row-2">
    <div class="field">
      <label for="date">日付</label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label for="calendar">カレンダー</label>
      <select id="calendar">
        <option value="work">仕事</option>
        <option value="personal">個人</option>
      </select>
    </div>
  </div>

  <div class="row-2">
    <div class="field">
      <label for="startTime">開始</label>
      <input type="time" id="startTime">
    </div>
    <div class="field">
      <label for="endTime">終了</label>
      <input type="time" id="endTime">
    </div>
  </div>

  <div class="field">
    <label for="location">場所</label>
    <input type="text" id="location" placeholder="例: 秋田ノーザンゲートスクエア">
  </div>

  <div class="field">
    <label for="description">本文・メモ</label>
    <textarea id="description" placeholder="概要・アジェンダ・メモ"></textarea>
  </div>

  <div class="actions">
    <button id="btn-cancel" type="button">キャンセル</button>
    <button id="btn-register" type="button">登録</button>
  </div>

  <p id="status"></p>

  <script src="confirm.js"></script>
</body>
</html>
